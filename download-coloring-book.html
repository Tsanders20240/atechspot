<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Download ABCs of Technology Coloring & Activity Book</title>
<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f4f7fa;color:#142033}
.wrap{max-width:760px;margin:60px auto;padding:24px}
.card{background:#fff;border:1px solid #d9e1e8;border-radius:14px;padding:32px;box-shadow:0 18px 45px rgba(16,38,63,.10)}
h1{font-family:Georgia,serif;color:#10263f;font-size:2.4rem;margin-top:0}
p{line-height:1.6;color:#5c6978}
button,a.btn{display:inline-block;background:#1762a8;color:#fff;border:0;border-radius:8px;padding:14px 20px;font-weight:700;text-decoration:none;cursor:pointer;margin-right:10px}
button:hover,a.btn:hover{background:#104b81}
.note{margin-top:18px;padding:14px;background:#fff8e8;border-left:4px solid #dca72d}

/* v4 Professional conversion-focused upgrades */
:root{
  --accent-soft:#eef6fd;
  --accent-warm:#fff8e6;
  --accent-green:#eef8f3;
}
.hero{position:relative;overflow:hidden}
.hero:before{
  content:"";position:absolute;right:-130px;top:-120px;width:420px;height:420px;
  border-radius:50%;background:radial-gradient(circle,rgba(23,98,168,.14),rgba(23,98,168,0) 70%);
  pointer-events:none
}
.hero:after{
  content:"";position:absolute;left:-150px;bottom:-180px;width:360px;height:360px;
  border-radius:50%;background:radial-gradient(circle,rgba(220,167,45,.14),rgba(220,167,45,0) 70%);
  pointer-events:none
}
.hero-grid{position:relative;z-index:1}
.hero h1{max-width:760px}
.hero .lead{font-size:1.22rem}
.hero-panel{border-top:5px solid var(--gold)}
.quick-trust{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:26px
}
.quick-trust div{
  background:#fff;border:1px solid var(--line);border-radius:10px;padding:15px 14px;
  box-shadow:0 8px 24px rgba(16,38,63,.05)
}
.quick-trust strong{display:block;color:var(--navy);font-size:.96rem}
.quick-trust span{display:block;color:var(--muted);font-size:.82rem;margin-top:3px}
.section-title-rule{width:54px;height:4px;border-radius:10px;background:var(--gold);margin:12px 0 18px}
.service,.card{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.service:hover,.card:hover{transform:translateY(-3px);box-shadow:0 16px 36px rgba(16,38,63,.09)}
.card.featured{border-color:#b7cde0;background:linear-gradient(180deg,#fff,#f7fbff)}
.badge{
  display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;
  background:var(--accent-soft);color:var(--blue-dark);font-size:.78rem;font-weight:800
}
.badge:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--blue)}
.eyebrow-row{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}
.client-path{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;counter-reset:path
}
.client-path .path-card{
  position:relative;background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px 18px 20px
}
.client-path .path-card:before{
  counter-increment:path;content:counter(path);width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;background:var(--navy);color:#fff;font-weight:800;margin-bottom:15px
}
.client-path h3{font-size:1.06rem}
.client-path p{font-size:.92rem;color:var(--muted)}
.outcome-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.outcome-strip div{padding:22px;border-radius:12px;border:1px solid var(--line);background:#fff}
.outcome-strip strong{display:block;color:var(--navy);font-size:1.05rem;margin-bottom:5px}
.highlight-box{
  background:linear-gradient(135deg,var(--accent-soft),#fff);
  border:1px solid #cbdcea;border-radius:14px;padding:28px
}
.form-shell{
  max-width:940px;margin:auto;background:#fff;border:1px solid var(--line);
  border-top:5px solid var(--blue);border-radius:14px;padding:30px;box-shadow:var(--shadow)
}
.form-progress{
  display:flex;gap:8px;flex-wrap:wrap;margin:0 0 22px
}
.form-progress span{
  padding:6px 10px;background:var(--mist);border:1px solid var(--line);border-radius:999px;
  color:var(--muted);font-size:.78rem;font-weight:700
}
.secure-form-intro{
  display:flex;gap:18px;align-items:flex-start;padding:18px;border-radius:10px;
  background:var(--accent-green);border:1px solid #cce7da;margin-bottom:20px
}
.secure-form-intro strong{display:block;color:var(--navy)}
.secure-form-intro p{margin:3px 0 0;color:var(--muted);font-size:.9rem}
.form-help{font-size:.84rem;color:var(--muted);margin-top:4px}
.required-mark{color:#a13f3f}
.status-box{min-height:22px;font-weight:700;color:var(--blue-dark)}
.form-success{
  display:none;padding:18px;border-radius:10px;background:var(--accent-green);
  border:1px solid #b8ddcc;color:#174f3c
}
.form-success.show{display:block}
.hero-callout{
  display:flex;gap:16px;align-items:center;padding:15px 17px;border-radius:10px;
  background:rgba(255,255,255,.82);border:1px solid var(--line);margin-top:20px
}
.hero-callout strong{color:var(--navy)}
.hero-callout span{color:var(--muted);font-size:.9rem}
@media(max-width:900px){
  .quick-trust,.client-path{grid-template-columns:1fr 1fr}
  .outcome-strip{grid-template-columns:1fr}
}
@media(max-width:640px){
  .quick-trust,.client-path{grid-template-columns:1fr}
  .form-shell{padding:22px 18px}
}

</style>
</head>

function makeBlobUrl() { const binary = atob(pdfBase64); const bytes = new Uint8Array(binary.length); for (let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i); return URL.createObjectURL(new Blob([bytes], {type:"application/pdf"}));
}
document.getElementById("downloadPdf").addEventListener("click", () => { const url = makeBlobUrl(); const a = document.createElement("a"); a.href = url; a.download = "abcs-of-technology-coloring-activity-book.pdf"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 5000);
});
document.getElementById("openPdf").addEventListener("click", (e) => { e.preventDefault(); const url = makeBlobUrl(); window.open(url, "_blank", "noopener");
});
